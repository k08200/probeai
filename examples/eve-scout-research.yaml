id: eve-scout-research
name: "EVE Scout Research (live)"
description: "Run EVE scout in research mode with a simple task. Requires Ollama + Docker."
timeout: 300

agent:
  type: command
  command: "cd /Users/yongrean/Downloads/nightbot && npx tsx src/cli.ts run 'What is 2+2? Write a Node.js script that prints the answer.' -t feasibility"

steps:
  - action: check_output
    expect: "Report"

evaluate:
  method: hybrid
  passThreshold: 50
  model: "qwen2.5-coder:14b"
  rubric: |
    Evaluate whether the AI coding agent successfully completed a research task.
    The task was: "What is 2+2? Write a Node.js script that prints the answer."

    Score based on:
    - Did the agent produce a report? (30 points)
    - Does the report contain a conclusion or answer? (30 points)
    - Did the agent actually run code in a sandbox? (20 points)
    - Is the report well-structured with sections? (20 points)

    Be strict: if there's no report or the agent crashed, score 0.
  rules:
    - type: exit_code
      target: exit
      value: "0"
      weight: 3
    - type: contains
      target: stdout
      value: "Done in"
      weight: 2
    - type: regex
      target: stdout
      value: "Report"
      weight: 2
    - type: regex
      target: stdout
      value: "(iterations|Iteration)"
      weight: 1
