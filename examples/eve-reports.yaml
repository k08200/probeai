id: eve-reports-list
name: "EVE Reports List"
description: "Verify EVE can list generated reports"

agent:
  type: command
  command: "cd /Users/yongrean/Downloads/nightbot && npx tsx src/cli.ts reports"

steps:
  - action: check_output
    expect: "report"

evaluate:
  method: rules
  passThreshold: 50
  rules:
    - type: exit_code
      target: exit
      value: "0"
      weight: 2
    - type: regex
      target: stdout
      value: "(report|\\.md|No reports)"
      weight: 1
