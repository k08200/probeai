# Template: API Health Check
# Tests that an HTTP endpoint responds correctly.
# Replace {{url}} and {{expected_body}} with your values.

id: api-health-RENAME
name: "API Health Check"
description: "Verify API endpoint responds with expected data"

agent:
  type: command
  command: "curl -sf {{url}}"

steps:
  - action: check_output
    expect: "{{expected_body}}"

evaluate:
  method: rules
  passThreshold: 100
  rules:
    - type: exit_code
      target: exit
      value: "0"
      weight: 2
    - type: contains
      target: stdout
      value: "{{expected_body}}"
      weight: 2
    - type: regex
      target: stdout
      value: "\\{"
      weight: 1
