# Template: AI Agent Task Execution
# Tests that an AI agent can complete a task and produce output.
# Requires Ollama + Docker for LLM-based agents.
# Replace {{agent_command}}, {{task_description}}, and {{rubric}} with your values.

id: agent-task-RENAME
name: "Agent Task Execution"
description: "Run an AI agent with a task and evaluate the result"
timeout: 300

agent:
  type: command
  command: "{{agent_command}}"

steps:
  - action: check_output
    expect: "done"

evaluate:
  method: hybrid
  passThreshold: 60
  model: "qwen2.5-coder:14b"
  rubric: |
    {{rubric}}

    Score based on:
    - Did the agent complete the task? (40 points)
    - Is the output correct and well-structured? (30 points)
    - Did the agent handle errors gracefully? (15 points)
    - Was the execution efficient? (15 points)
  rules:
    - type: exit_code
      target: exit
      value: "0"
      weight: 3
    - type: regex
      target: stdout
      value: "(done|complete|report|success)"
      weight: 1
