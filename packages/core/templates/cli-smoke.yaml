# Template: CLI Smoke Test
# Tests that a CLI command runs without crashing.
# Replace {{command}} and {{expected_output}} with your values.

id: cli-smoke-RENAME
name: "CLI Smoke Test"
description: "Verify CLI command runs and exits cleanly"

agent:
  type: command
  command: "{{command}}"

steps:
  - action: check_output
    expect: "{{expected_output}}"

evaluate:
  method: rules
  passThreshold: 100
  rules:
    - type: exit_code
      target: exit
      value: "0"
      weight: 2
    - type: contains
      target: stdout
      value: "{{expected_output}}"
      weight: 1
